# Render.com blueprint — free web service with a persistent disk for SQLite.
services:
  - type: web
    name: data-analytics-academy
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /data
      # Optional: point at a hosted Ollama for the AI tutor (leave unset to disable).
      # - key: OLLAMA_URL
      #   value: http://your-ollama-host:11434
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
